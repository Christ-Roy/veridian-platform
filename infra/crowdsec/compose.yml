# CrowdSec — compose IaC (Veridian prod)
#
# Statut : draft 2026-05-13 — pas encore appliqué via Dokploy.
# Container `code-crowdsec-1` tourne actuellement en `unless-stopped` (donc
# survit aux reboots) mais Dokploy ne le manage plus depuis le 2026-05-10
# (compose en `.disabled` à cause d'une collision résolue). Faut le re-onboarder.
#
# Différences vs compose original (`docker-compose.yml.bak-20260508-175526`) :
# - SUPPRIMÉ : service `crowdsec-traefik-bouncer` (fbonalair v0.5.0 abandonware).
#   Depuis 2026-05-13, le bouncer est un plugin Traefik officiel embarqué dans
#   `dokploy-traefik` (cf `infra/traefik/dynamic/crowdsec-middleware.yml`).
# - GARDÉ : service `crowdsec` v1.7.7 + volumes external + mount docker.sock.

services:
  crowdsec:
    image: crowdsecurity/crowdsec:v1.7.7
    restart: unless-stopped
    networks:
      - dokploy-network
    environment:
      GID: "1000"
      DISABLE_ONLINE_API: "false"
      # Collections installées au boot si absentes (16 collections, 69 scenarios,
      # 188 appsec rules actives au 2026-05-13 11:37).
      #
      # HTTP générique :
      # - http-cve : signatures CVE web connues
      # - http-dos : DDoS bypass-cache, random-uri, switching-ua, invalid-versions
      # - http-extended-context : enrichit events HTTP (geo, ASN)
      #
      # WAF / AppSec (règles chargées, nécessite service AppSec proxy actif) :
      # - appsec-virtual-patching : règles WAF vpatch pour CVE récentes
      # - appsec-generic-rules : règles WAF génériques (SSTI, no-UA, wordpress uploads)
      #
      # Reverse proxy :
      # - traefik : HTTP brute, slowloris, path traversal, sqli
      #
      # SSH :
      # - sshd (via collection linux) : SSH brute-force
      # - sshd-impossible-travel : compte compromis via geo anomalie
      #
      # Linux :
      # - linux : SSH brute, fail2ban-style scenarios
      # - linux-lpe : CVE-2021-4034 (PwnKit), CVE-2023-4911 (Looney Tunables)
      #
      # Firewall :
      # - iptables : détection port scans via iptables logs
      #
      # Supabase (legacy en prod) :
      # - supabase-compose : SaaS Supabase auth/gotrue
      # - supabase-supavisor : Postgres pooler brute-force
      #
      # Whitelist :
      # - whitelist-good-actors : DNS publics, CDN Cloudflare, SEO bots
      COLLECTIONS: >-
        crowdsecurity/linux
        crowdsecurity/traefik
        crowdsecurity/http-cve
        crowdsecurity/http-dos
        crowdsecurity/http-extended-context
        crowdsecurity/appsec-virtual-patching
        crowdsecurity/appsec-generic-rules
        crowdsecurity/sshd-impossible-travel
        crowdsecurity/linux-lpe
        crowdsecurity/iptables
        crowdsecurity/supabase-compose
        crowdsecurity/supabase-supavisor
        crowdsecurity/whitelist-good-actors
    volumes:
      # Logs hôte (SSH auth.log pour scenarios linux)
      - /var/log:/var/log:ro
      # Volumes external CrowdSec (DB sqlite + config)
      # Préservent les bans actifs + collections installées entre redéploiements
      - infra_crowdsec-db:/var/lib/crowdsec/data
      - infra_crowdsec-config:/etc/crowdsec
      # Docker socket : datasource Docker pour parser les logs Traefik
      # via le acquis.yaml généré (cf session 2026-05-08 crowdsec-aveugle)
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test:
        - CMD
        - cscli
        - version
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 6G
          cpus: "2.0"
        reservations:
          memory: 128M
          cpus: "0.1"

volumes:
  infra_crowdsec-db:
    external: true
  infra_crowdsec-config:
    external: true

networks:
  dokploy-network:
    external: true
