# ============================================================================
# DEVELOPMENT OVERRIDES - Local Development Configuration
# ============================================================================
# Ce fichier contient les configurations spécifiques au développement local :
# - Pas de TLS/HTTPS (HTTP uniquement via Traefik)
# - Domaine : localhost
# - Pas de Let's Encrypt
# - Logs plus verbeux pour debug
# - Mailpit pour intercepter les emails
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
# ============================================================================

version: '3.8'

services:

  # ==========================================================================
  # CROWDSEC - Development Configuration
  # ==========================================================================
  crowdsec:
    environment:
      GID_CROWDSEC: "1000"
      DISABLE_ONLINE_API: "true"  # Disable in dev for privacy
      LOG_LEVEL: info

  crowdsec-traefik-bouncer:
    environment:
      CROWDSEC_BOUNCER_API_KEY: ${CROWDSEC_BOUNCER_API_KEY_DEV}
      GIN_MODE: debug  # Development mode with verbose logs

  # ==========================================================================
  # TRAEFIK - Development Configuration with Let's Encrypt
  # ==========================================================================
  traefik:
    ports:
      - "0.0.0.0:80:80"    # HTTP
      - "0.0.0.0:443:443"  # HTTPS
    command:
      - "--api.insecure=false"
      - "--api.dashboard=true"
      - "--log.level=INFO"  # More verbose logs in dev
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=global-saas-network"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      # Let's Encrypt configuration
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.dnschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.dnschallenge.provider=cloudflare"
      - "--certificatesresolvers.letsencrypt.acme.dnschallenge.delaybeforecheck=0"
      - "--certificatesresolvers.letsencrypt.acme.dnschallenge.resolvers=1.1.1.1:53,8.8.8.8:53"
    environment:
      - CLOUDFLARE_EMAIL=${CLOUDFLARE_EMAIL}
      - CLOUDFLARE_DNS_API_TOKEN=${CLOUDFLARE_API_TOKEN}
    volumes:
      - ./letsencrypt:/letsencrypt
    labels:
      - "traefik.http.routers.dashboard.tls=true"
      - "traefik.http.routers.dashboard.tls.certresolver=letsencrypt"
  dashboard:
    build:
      context: ../Web-Dashboard
      target: dev
    volumes:
      - ../Web-Dashboard:/app
      - /app/node_modules
      - dashboard-next:/app/.next
    environment:
      CI: "true"
      NODE_OPTIONS: "--max-old-space-size=1536"
    labels:
      - "traefik.http.routers.web-dashboard.tls=true"
      - "traefik.http.routers.web-dashboard.tls.certresolver=letsencrypt"
      - "traefik.http.routers.web-dashboard.entrypoints=websecure"

  # ==========================================================================
  # NOTIFUSE - Development HTTPS Configuration
  # ==========================================================================
  notifuse:
    environment:
      ENVIRONMENT: development  # Enable development mode
      LOG_LEVEL: debug          # Verbose logging (debug, info, warn, error)
      TRACING_ENABLED: "false"  # Set to true for distributed tracing
    labels:
      - "traefik.http.routers.notifuse.tls=true"
      - "traefik.http.routers.notifuse.tls.certresolver=letsencrypt"
      - "traefik.http.routers.notifuse.entrypoints=websecure"
      - "traefik.http.routers.notifuse.middlewares="  # Disable crowdsec in dev

  # ==========================================================================
  # TWENTY - Development HTTPS Configuration
  # ==========================================================================
  twenty-server:
    environment:
      NODE_ENV: development             # Enable development mode
      SERVER_URL: https://twenty.${DOMAIN}     # Backend URL (for API)
      FRONTEND_URL: https://twenty.${DOMAIN}   # Frontend URL (for CORS)
      LOG_LEVELS: log,error,warn,debug  # Verbose logging levels
      LOGGER_DRIVER: CONSOLE            # Console output for logs
      SERVERLESS_LOGS_ENABLED: "true"   # Show serverless function logs
      TELEMETRY_ENABLED: "false"        # Disable telemetry in dev
      AUTH_PASSWORD_ENABLED: "false"     # Enable password auth in dev
      # Cal.com Booking
      CALENDAR_BOOKING_PAGE_ID: "team/twenty/talk-to-us"
      # NOTE: After changing Stripe products, run: docker compose exec twenty-server yarn command:prod billing:sync-plans-data
    labels:
      - "traefik.http.routers.twenty.tls=true"
      - "traefik.http.routers.twenty.tls.certresolver=letsencrypt"
      - "traefik.http.routers.twenty.entrypoints=websecure"

  # Worker - Billing configuration inherited from docker-compose.yml
  # (No overrides needed for worker in dev)


  # ==========================================================================
  # SUPABASE AUTH - Development Configuration
  # ==========================================================================
  auth:
    environment:
      # Auto-confirm emails in dev (skip email verification)
      GOTRUE_MAILER_AUTOCONFIRM: "true"

      # Rate Limiting - ACTIVÉ pour tests (limite basse)
      GOTRUE_RATE_LIMIT_TOKEN_REFRESH: "5"   # 5 refresh/heure pour tester
      GOTRUE_RATE_LIMIT_EMAIL_SENT: "10"
      GOTRUE_RATE_LIMIT_SMS_SENT: "10"
      GOTRUE_RATE_LIMIT_VERIFY: "10"

volumes:
  dashboard-node-modules:  # Persist node_modules between restarts
  dashboard-next:          # Persist Next.js cache
