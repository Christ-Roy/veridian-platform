# ============================================================================
# TEST OVERRIDES - Stack minimale pour tests browser du Web-Dashboard
# ============================================================================
# Utilisation (~1.5 Go RAM au lieu de 4+ Go) :
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml -f docker-compose.test.yml up -d
#
# Services actifs : traefik, supabase-db, kong, auth, rest, dashboard
# Services desactives : studio, realtime, storage, imgproxy, meta, functions,
#   twenty-*, notifuse-*, crowdsec-*, cron-scheduler, backup
#
# Le dashboard demarre SANS twenty et notifuse (les pages qui les appellent
# seront en erreur, mais on peut tester : landing, auth, pricing, theme, nav)
# ============================================================================

version: '3.8'

services:

  # === DESACTIVER les services lourds non necessaires ===

  # Supabase optionnels
  studio:
    profiles: ["full"]
  realtime:
    profiles: ["full"]
  storage:
    profiles: ["full"]
  imgproxy:
    profiles: ["full"]
  meta:
    profiles: ["full"]
  functions:
    profiles: ["full"]

  # Twenty stack complet
  twenty-server:
    profiles: ["full"]
  twenty-worker:
    profiles: ["full"]
  twenty-postgres:
    profiles: ["full"]
  twenty-redis:
    profiles: ["full"]

  # Notifuse stack complet
  notifuse:
    profiles: ["full"]
  notifuse-postgres:
    profiles: ["full"]

  # Securite (pas critique pour les tests)
  crowdsec:
    profiles: ["full"]
  crowdsec-traefik-bouncer:
    profiles: ["full"]

  # Utilitaires
  cron-scheduler:
    profiles: ["full"]

  # === DASHBOARD : retirer les depends_on sur twenty/notifuse ===
  dashboard:
    depends_on:
      supabase-db:
        condition: service_healthy
      kong:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 512M

  # === LIMITER la RAM des services restants ===
  supabase-db:
    deploy:
      resources:
        limits:
          memory: 384M
    # Desactiver les extensions lourdes
    command: >
      postgres
      -c shared_buffers=64MB
      -c effective_cache_size=128MB
      -c work_mem=4MB
      -c maintenance_work_mem=32MB
      -c max_connections=50

  kong:
    deploy:
      resources:
        limits:
          memory: 256M

  auth:
    deploy:
      resources:
        limits:
          memory: 128M

  rest:
    deploy:
      resources:
        limits:
          memory: 128M

  traefik:
    deploy:
      resources:
        limits:
          memory: 128M
    # Desactiver le middleware crowdsec (pas de bouncer en test)
    labels:
      - "traefik.http.middlewares.crowdsec-bouncer.forwardauth.address=http://localhost:1/noop"
