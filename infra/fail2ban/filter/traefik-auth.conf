[Definition]
# Filter for Traefik authentication failures
failregex = ^.*"RemoteAddr":"<HOST>".*"StatusCode":401.*$
            ^.*"RemoteAddr":"<HOST>".*"StatusCode":403.*$
ignoreregex = ^.*"RemoteAddr":"(127\.0\.0\.1|::1)".*$

[Init]
# Journal match pattern
journalmatch = _SYSTEMD_UNIT=traefik.service