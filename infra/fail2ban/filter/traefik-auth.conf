# fail2ban filter — Traefik access logs : 401/403 sur endpoints auth
#
# Parse les access logs JSON de Traefik (sortie stdout, format JSON via
# accessLog.format=json dans traefik.yml).
#
# Sample matched line (Docker json-file wrap stripping):
# {"log":"{\"ClientHost\":\"1.2.3.4\",\"RequestPath\":\"/api/auth/...\",\"DownstreamStatus\":401,...}","stream":"stdout","time":"..."}
#
# IMPORTANT — chemin du log varie selon Docker logging driver :
# - Si Docker en `json-file` (Veridian prod 2026-05-13) :
#   /var/lib/docker/containers/<container-id>/<container-id>-json.log
#   Le container-id Traefik est stable tant qu'on ne le recreate pas. Le
#   compose.yml monte ce path via /var/lib/docker:/var/lib/docker:ro.
# - Si Docker en `journald` (futur, P0.5 follow-up) :
#   utiliser `backend = systemd` + `journalmatch = CONTAINER_NAME=dokploy-traefik`
#
# La regex match les deux formats : json plat (journald) OU json-encapsulé
# (json-file Docker, qui wrap chaque ligne dans un objet "log":"...").

[Definition]
failregex = ^.*"ClientHost":\\?"<HOST>\\?".*"DownstreamStatus":(?:401|403).*"RequestPath":\\?"/(?:api/auth|login|signin|sign-in|admin)
ignoreregex = ^.*"ClientHost":\\?"(?:127\.0\.0\.1|::1)\\?".*$

[Init]
# Lecture via journald (si Docker --log-driver=journald)
journalmatch = CONTAINER_NAME=dokploy-traefik
