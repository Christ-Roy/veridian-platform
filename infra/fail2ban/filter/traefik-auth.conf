# fail2ban filter — Traefik access logs : 401/403 sur endpoints auth
#
# Parse les access logs JSON de Traefik (sortie stdout, vue via journalctl
# CONTAINER_NAME=dokploy-traefik). Match les requêtes auth-related qui retournent
# 401 ou 403 (brute-force sur endpoints auth).
#
# Sample matched line:
# {"ClientHost":"1.2.3.4","RequestPath":"/api/auth/...","DownstreamStatus":401,...}
#
# Note : nécessite que Traefik soit configuré avec accessLog.format=json
# (cf infra/traefik/traefik.yml — déjà OK).

[Definition]
failregex = ^.*"ClientHost":"<HOST>".*"DownstreamStatus":(?:401|403).*"RequestPath":"/(?:api/auth|login|signin|sign-in|admin)
ignoreregex = ^.*"ClientHost":"(?:127\.0\.0\.1|::1)".*$

[Init]
# Lecture des logs Traefik via journald (Docker --log-driver=journald)
journalmatch = CONTAINER_NAME=dokploy-traefik
