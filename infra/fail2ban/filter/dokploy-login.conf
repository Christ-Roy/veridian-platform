# fail2ban filter — Dokploy /api/auth/sign-in/email brute
#
# Better-Auth retourne 401 sur INVALID_EMAIL_OR_PASSWORD et 429 sur rate-limit.
# On ban les IPs qui accumulent des 401 sur /api/auth/sign-in*.

[Definition]
failregex = ^.*"ClientHost":"<HOST>".*"RequestPath":"/api/auth/sign-in.*".*"DownstreamStatus":401
ignoreregex = ^.*"ClientHost":"(?:127\.0\.0\.1|::1)".*$

[Init]
journalmatch = CONTAINER_NAME=dokploy-traefik
