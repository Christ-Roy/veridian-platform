[Definition]
# Filter for Supabase authentication failures
failregex = ^.*"msg":"invalid_request".*"ip":"<HOST>".*$
            ^.*"msg":"authentication_failed".*"ip":"<HOST>".*$
            ^.*"error":"invalid_credentials".*"remote_addr":"<HOST>".*$
ignoreregex =

[Init]
# Journal match pattern
journalmatch = _SYSTEMD_UNIT=supabase.service