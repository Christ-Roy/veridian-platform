[Definition]
# Action to block IPs using iptables in Docker container
actionstart = iptables -N f2b-<name>
              iptables -A f2b-<name> -j RETURN
              iptables -I INPUT -p <protocol> --dport <port> -j f2b-<name>

actionstop = iptables -D INPUT -p <protocol> --dport <port> -j f2b-<name>
             iptables -F f2b-<name>
             iptables -X f2b-<name>

actioncheck = iptables -n -L INPUT | grep -q 'f2b-<name>[ \t]'

actionban = iptables -I f2b-<name> 1 -s <ip> -j <blocktype>

actionunban = iptables -D f2b-<name> -s <ip> -j <blocktype>

[Init]
# Default parameters
protocol = tcp
port = 0:65535
blocktype = REJECT