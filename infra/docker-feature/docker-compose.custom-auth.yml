  # ==========================================================================
  # NOTIFUSE STACK - Email Marketing Platform
  # ==========================================================================

  # PostgreSQL 17 - Base de données dédiée Notifuse
  notifuse-postgres:
    container_name: notifuse-postgres
    image: postgres:17-alpine
    restart: unless-stopped
    networks:
      - global-saas-network
    ports:
      - "127.0.0.1:5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev_postgres_password_change_in_production}
      POSTGRES_DB: notifuse_system
    volumes:
      - notifuse-db-data:/var/lib/postgresql/data
    command: postgres -c 'max_wal_size=1GB' -c 'checkpoint_timeout=10min'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  # Notifuse API
  notifuse:
    container_name: notifuse-api
    build:
      context: ./app/Notifuse/notifuse
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - global-saas-network
    depends_on:
      notifuse-postgres:
        condition: service_healthy
    environment:
      SERVER_PORT: 8081
      SERVER_HOST: 0.0.0.0
      ENVIRONMENT: development
      API_ENDPOINT: https://notifuse.${DOMAIN}
      DB_HOST: notifuse-postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD:-dev_postgres_password_change_in_production}
      DB_PREFIX: notifuse
      DB_NAME: notifuse_system
      DB_SSLMODE: disable
      SECRET_KEY: ${NOTIFUSE_SECRET_KEY:-dev-notifuse-secret-key-change-in-production-min-32-chars}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASS:-}
      SMTP_FROM_EMAIL: ${SMTP_ADMIN_EMAIL:-noreply@localhost}
      SMTP_FROM_NAME: ${SMTP_SENDER_NAME:-Global SaaS Platform}
      TASK_SCHEDULER_ENABLED: true
      TASK_SCHEDULER_INTERVAL: 20s
      TASK_SCHEDULER_MAX_TASKS: 100
      ROOT_EMAIL: brunon5robert@gmail.com
    volumes:
      - notifuse-data:/app/data
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://127.0.0.1:8081/healthz']
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.notifuse.rule=Host(`notifuse.${DOMAIN}`)"
      - "traefik.http.routers.notifuse.tls=true"
      - "traefik.http.routers.notifuse.tls.certresolver=letsencrypt"
      - "traefik.http.services.notifuse.loadbalancer.server.port=8081"

      # ==========================================================================
      # 🔒 FORWARDAUTH: Authentification obligatoire via Supabase
      # ==========================================================================
      # Toutes les requêtes vers Notifuse passent d'abord par GoTrue
      # pour vérifier le JWT Supabase. Si invalide → 401 Unauthorized
      # ==========================================================================
      - "traefik.http.routers.notifuse.middlewares=supabase-auth@docker"

  # ==========================================================================
  # TWENTY STACK - CRM Platform
  # ==========================================================================

  # PostgreSQL 15 - Base de données dédiée Twenty
  twenty-postgres:
    container_name: twenty-postgres
    image: postgres:15-alpine
    restart: unless-stopped
    networks:
      - global-saas-network
    ports:
      - "127.0.0.1:5434:5432"
    environment:
      POSTGRES_USER: twenty
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev_postgres_password_change_in_production}
      POSTGRES_DB: twenty
    volumes:
      - twenty-db-data:/var/lib/postgresql/data
      - ./volumes/twenty-db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U twenty"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis - Cache & Queues
  twenty-redis:
    container_name: twenty-redis
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - global-saas-network
    command: redis-server --save 60 1000 --appendonly yes
    volumes:
      - twenty-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Twenty Server - Application CRM
  twenty-server:
    container_name: twenty-server
    image: twentycrm/twenty:latest
    restart: unless-stopped
    networks:
      - global-saas-network
    depends_on:
      twenty-postgres:
        condition: service_healthy
      twenty-redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      NODE_PORT: 3000
      SERVER_URL: ${TWENTY_SERVER_URL:-https://twenty.${DOMAIN}}
      FRONTEND_URL: ${TWENTY_FRONTEND_URL:-https://twenty.${DOMAIN}}
      APP_SECRET: ${TWENTY_APP_SECRET:-dev-twenty-secret-change-in-production-min-32-chars}
      IS_MULTIWORKSPACE_ENABLED: "true"
      IS_WORKSPACE_CREATION_LIMITED_TO_SERVER_ADMINS: "true"
      WORKSPACE_INACTIVE_DAYS_BEFORE_NOTIFICATION: "30"
      WORKSPACE_INACTIVE_DAYS_BEFORE_SOFT_DELETION: "60"
      WORKSPACE_INACTIVE_DAYS_BEFORE_DELETION: "90"
      MAX_NUMBER_OF_WORKSPACES_DELETED_PER_EXECUTION: "10"
      IS_BILLING_ENABLED: "false"
      # 🔒 SÉCURITÉ: Vérification email activée pour bloquer inscriptions directes
      # Les emails ne seront PAS envoyés car EMAIL_DRIVER=logger
      # Seul le Dashboard peut créer des comptes (via provisioning)
      IS_EMAIL_VERIFICATION_REQUIRED: "true"
      PG_DATABASE_URL: postgresql://twenty:${POSTGRES_PASSWORD:-dev_postgres_password_change_in_production}@twenty-postgres:5432/twenty
      PG_ENABLE_POOL_SHARING: "true"
      PG_POOL_MAX_CONNECTIONS: "50"
      REDIS_URL: redis://twenty-redis:6379
      REDIS_QUEUE_URL: redis://twenty-redis:6379/1
      DISABLE_DB_MIGRATIONS: "false"
      DISABLE_CRON_JOBS_REGISTRATION: "false"
      AUTH_PASSWORD_ENABLED: "true"
      EMAIL_DRIVER: ${EMAIL_DRIVER:-logger}
      EMAIL_SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      EMAIL_SMTP_PORT: ${SMTP_PORT:-587}
      EMAIL_SMTP_USER: ${SMTP_USER:-}
      EMAIL_SMTP_PASSWORD: ${SMTP_PASS:-}
      EMAIL_SMTP_NO_TLS: "false"
      EMAIL_FROM_ADDRESS: ${SMTP_ADMIN_EMAIL:-noreply@localhost}
      EMAIL_FROM_NAME: ${SMTP_SENDER_NAME:-Global SaaS Platform}
      EMAIL_SYSTEM_ADDRESS: ${SMTP_ADMIN_EMAIL:-admin@localhost}
      EMAIL_VERIFICATION_TOKEN_EXPIRES_IN: 24h
      PASSWORD_RESET_TOKEN_EXPIRES_IN: 15m
      INVITATION_TOKEN_EXPIRES_IN: 7d
      ACCESS_TOKEN_EXPIRES_IN: 30m
      REFRESH_TOKEN_EXPIRES_IN: 90d
      LOGIN_TOKEN_EXPIRES_IN: 15m
      STORAGE_TYPE: LOCAL
      STORAGE_LOCAL_PATH: .local-storage
      TELEMETRY_ENABLED: "false"
      LOGGER_DRIVER: CONSOLE
      LOG_LEVELS: log,error,warn
    volumes:
      - twenty-storage:/app/packages/twenty-server/.local-storage
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:3000/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.twenty.rule=HostRegexp(`{subdomain:[a-z0-9-]+}.twenty.${DOMAIN}`) || Host(`twenty.${DOMAIN}`)"
      - "traefik.http.routers.twenty.tls=true"
      - "traefik.http.routers.twenty.tls.certresolver=letsencrypt"
      # Certificat wildcard pour Twenty : domaine principal + sous-domaines
      - "traefik.http.routers.twenty.tls.domains[0].main=twenty.${DOMAIN}"
      - "traefik.http.routers.twenty.tls.domains[0].sans=*.twenty.${DOMAIN}"
      - "traefik.http.services.twenty.loadbalancer.server.port=3000"

      # ==========================================================================
      # 🔒 FORWARDAUTH: Authentification obligatoire via Supabase
      # ==========================================================================
      # Toutes les requêtes vers Twenty passent d'abord par GoTrue
      # pour vérifier le JWT Supabase. Si invalide → 401 Unauthorized
      # ==========================================================================
      - "traefik.http.routers.twenty.middlewares=supabase-auth@docker"

  # Twenty Worker - Jobs Asynchrones
  twenty-worker:
    container_name: twenty-worker
    image: twentycrm/twenty:latest
    restart: unless-stopped
    networks:
      - global-saas-network
    depends_on:
      twenty-server:
        condition: service_healthy
    command: ["yarn", "worker:prod"]
    environment:
      SERVER_URL: http://twenty-server:3000
      APP_SECRET: ${TWENTY_APP_SECRET:-dev-twenty-secret-change-in-production-min-32-chars}
      PG_DATABASE_URL: postgresql://twenty:${POSTGRES_PASSWORD:-dev_postgres_password_change_in_production}@twenty-postgres:5432/twenty
      PG_ENABLE_POOL_SHARING: "true"
      PG_POOL_MAX_CONNECTIONS: "50"
      REDIS_URL: redis://twenty-redis:6379
      REDIS_QUEUE_URL: redis://twenty-redis:6379/1
      DISABLE_DB_MIGRATIONS: "true"
      DISABLE_CRON_JOBS_REGISTRATION: "true"
      STORAGE_TYPE: LOCAL
      STORAGE_LOCAL_PATH: .local-storage
      EMAIL_DRIVER: ${EMAIL_DRIVER:-logger}
      EMAIL_SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      EMAIL_SMTP_PORT: ${SMTP_PORT:-587}
      EMAIL_SMTP_USER: ${SMTP_USER:-}
      EMAIL_SMTP_PASSWORD: ${SMTP_PASS:-}
      EMAIL_FROM_ADDRESS: ${SMTP_ADMIN_EMAIL:-noreply@localhost}
      EMAIL_FROM_NAME: ${SMTP_SENDER_NAME:-Global SaaS Platform}
    volumes:
      - twenty-storage:/app/packages/twenty-server/.local-storage

  # ==========================================================================
  # WEB DASHBOARD - Global SaaS Platform Orchestrator
  # ==========================================================================

  dashboard:
    container_name: web-dashboard
    build:
      context: ../Web-Dashboard
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - global-saas-network
    depends_on:
      supabase-db:
        condition: service_healthy
      kong:
        condition: service_started
    environment:
      # Next.js
      NODE_ENV: production
      HOSTNAME: "0.0.0.0"
      PORT: 3000

      # Supabase
      NEXT_PUBLIC_SUPABASE_URL: https://api.${DOMAIN}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY}

      # Stripe
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}

      # Domain & URLs (inherited from .env)
      DOMAIN: ${DOMAIN}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}

      # Services URLs (inherited from .env)
      TWENTY_GRAPHQL_URL: ${TWENTY_GRAPHQL_URL}
      TWENTY_FRONTEND_URL: ${TWENTY_FRONTEND_URL}
      TWENTY_METADATA_URL: ${TWENTY_METADATA_URL}
      NEXT_PUBLIC_TWENTY_URL: ${NEXT_PUBLIC_TWENTY_URL}

      NOTIFUSE_API_URL: ${NOTIFUSE_API_URL}
      NEXT_PUBLIC_NOTIFUSE_API_URL: ${NEXT_PUBLIC_NOTIFUSE_API_URL}
      NEXT_PUBLIC_NOTIFUSE_URL: ${NEXT_PUBLIC_NOTIFUSE_URL}
      NOTIFUSE_ROOT_EMAIL: ${NOTIFUSE_ROOT_EMAIL}

      # Database
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@supabase-db:${POSTGRES_PORT}/${POSTGRES_DB}
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.web-dashboard.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.web-dashboard.tls=true"
      - "traefik.http.routers.web-dashboard.tls.certresolver=letsencrypt"
      - "traefik.http.services.web-dashboard.loadbalancer.server.port=3000"

