# ============================================================================
# RESOURCE LIMITS - Fusibles de Sécurité
# ============================================================================
# Limites MAX pour éviter qu'un service qui s'emballe OOM le serveur
# Serveur prod: 11 GB RAM, 6 CPUs
# 60% = 6.6 GB RAM, 3.6 CPUs par service critique (fusible)
# ============================================================================

version: '3.8'

services:
  # ==========================================================================
  # SERVICES CRITIQUES - Fusible 60% (6.6 GB RAM, 3.6 CPUs)
  # ==========================================================================

  supabase-db:
    deploy:
      resources:
        limits:
          cpus: '3.6'
          memory: 6656M
        reservations:
          cpus: '0.25'
          memory: 512M

