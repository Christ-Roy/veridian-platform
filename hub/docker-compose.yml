version: '3.8'

# Connect to external Traefik network
networks:
  global-saas-network:
    external: true

services:
  dashboard:
    container_name: web-dashboard
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - global-saas-network
    # Don't expose ports directly - Traefik handles routing
    # ports:
    #   - "3000:3000"
    env_file:
      - .env.local
    environment:
      # Override specific env vars if needed
      NODE_ENV: production
      HOSTNAME: "0.0.0.0"
      PORT: 3000
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.web-dashboard.rule=Host(`${SITE_URL}`)"
      - "traefik.http.routers.web-dashboard.tls=true"
      - "traefik.http.routers.web-dashboard.tls.certresolver=letsencrypt"
      - "traefik.http.services.web-dashboard.loadbalancer.server.port=3000"
      - "traefik.docker.network=global-saas-network"
