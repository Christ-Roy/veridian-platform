# Analytics CI/CD — Pipeline complet avec staging + rollback
#
# Flow push main :
#  1. test          — lint, typecheck, vitest, build (cloud)
#  2. e2e           — playwright contre instance locale CI (cloud + postgres)
#  3. docker        — build + push GHCR (self-hosted, cache local)
#  4. deploy-staging — pull image sur dev-server, e2e staging
#  5. deploy-prod   — redeploy Dokploy + health check
#  6. rollback-prod — si deploy-prod fail, retour image précédente

name: Analytics CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'analytics/**'
      - '.github/workflows/analytics-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'analytics/**'
  workflow_dispatch:

concurrency:
  group: analytics-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: christ-roy/analytics

defaults:
  run:
    working-directory: analytics

jobs:
  # ── Phase 1 : Tests rapides (cloud, ~90s) ─────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: analytics/pnpm-lock.yaml

      - name: Install deps
        run: pnpm install --frozen-lockfile || pnpm install --no-frozen-lockfile

      - name: Prisma generate
        run: pnpm exec prisma generate

      - name: Typecheck
        run: pnpm exec tsc --noEmit

      - name: Lint
        run: pnpm lint
        continue-on-error: true

      - name: Unit tests (vitest)
        run: pnpm exec vitest run
        env:
          NODE_ENV: test

      - name: Build check
        run: pnpm build
        env:
          AUTH_SECRET: fake-auth-secret-for-build-at-least-32-chars-xx
          NEXTAUTH_URL: http://localhost:3000
          ADMIN_API_KEY: fake-admin-key-for-build-at-least-32-chars-xx

  # ── Phase 2 : E2E contre instance locale CI (cloud, ~3min) ────────
  e2e:
    needs: test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: analytics
          POSTGRES_PASSWORD: analytics_test_pw
          POSTGRES_DB: analytics
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://analytics:analytics_test_pw@127.0.0.1:5432/analytics?schema=analytics
      AUTH_SECRET: test-auth-secret-for-e2e-at-least-32-chars-xx
      AUTH_TRUST_HOST: 'true'
      NEXTAUTH_URL: http://127.0.0.1:3200
      ADMIN_API_KEY: test-admin-key-for-e2e-at-least-32-chars-xx
      E2E_EMAIL: robert@veridian.site
      E2E_PASSWORD: test1234
      ANALYTICS_E2E_URL: http://127.0.0.1:3200
      ENABLE_TEST_APIS: 'true'

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: analytics/pnpm-lock.yaml

      - name: Install deps
        run: pnpm install --frozen-lockfile || pnpm install --no-frozen-lockfile

      - name: Prisma db push
        run: pnpm exec prisma db push --skip-generate

      - name: Seed test data
        run: |
          cat > ci-seed.mjs <<'JS'
          import bcrypt from 'bcryptjs';
          import { PrismaClient } from '@prisma/client';
          const prisma = new PrismaClient();
          const hash = await bcrypt.hash('test1234', 10);

          const user = await prisma.user.upsert({
            where: { email: 'robert@veridian.site' },
            create: { email: 'robert@veridian.site', passwordHash: hash },
            update: { passwordHash: hash },
          });

          const tenant = await prisma.tenant.upsert({
            where: { slug: 'veridian-ci' },
            create: { slug: 'veridian-ci', name: 'Veridian (CI)' },
            update: {},
          });

          await prisma.membership.upsert({
            where: { tenantId_userId: { tenantId: tenant.id, userId: user.id } },
            create: { tenantId: tenant.id, userId: user.id, role: 'OWNER' },
            update: { role: 'OWNER' },
          });

          let site = await prisma.site.findFirst({
            where: { tenantId: tenant.id, domain: 'analytics.veridian.site' },
          });
          if (!site) {
            site = await prisma.site.create({
              data: {
                tenantId: tenant.id,
                domain: 'analytics.veridian.site',
                name: 'Analytics Veridian',
              },
            });
          }

          await prisma.gscProperty.upsert({
            where: { siteId: site.id },
            create: {
              siteId: site.id,
              propertyUrl: 'sc-domain:veridian.site',
              lastSyncAt: new Date(),
            },
            update: { lastSyncAt: new Date() },
          });

          const now = new Date();
          const rows = [];
          const queries = ['serrurier lyon', 'depannage serrurerie', 'cle perdue'];
          const pages = ['/', '/contact', '/tarifs'];
          for (let d = 0; d < 7; d++) {
            const day = new Date(now);
            day.setUTCHours(0, 0, 0, 0);
            day.setUTCDate(day.getUTCDate() - d - 2);
            for (let i = 0; i < 3; i++) {
              const q = queries[i % queries.length];
              const p = pages[i % pages.length];
              const clicks = 10 + i + d;
              const impressions = 100 + i * 10 + d * 5;
              rows.push({
                siteId: site.id,
                day,
                query: q,
                page: p,
                country: 'fra',
                device: 'desktop',
                searchType: 'web',
                clicks,
                impressions,
                ctr: clicks / impressions,
                position: 3 + (i + d) * 0.5,
              });
            }
          }
          await prisma.gscDaily.createMany({ data: rows, skipDuplicates: true });

          console.log('seeded robert@veridian.site + tenant veridian-ci + ' + rows.length + ' GscDaily rows');
          await prisma.$disconnect();
          JS
          node ci-seed.mjs
          rm ci-seed.mjs

      - name: Build
        run: pnpm build

      - name: Copy public/ and .next/static into standalone
        run: |
          cp -r public .next/standalone/public
          cp -r .next/static .next/standalone/.next/static

      - name: Start analytics in prod mode (background)
        run: |
          nohup node .next/standalone/server.js > /tmp/analytics.log 2>&1 &
          echo $! > /tmp/analytics.pid
        env:
          HOSTNAME: 127.0.0.1
          PORT: '3200'
          NODE_ENV: test
          ENABLE_TEST_APIS: 'true'

      - name: Wait for /api/health
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:3200/api/health >/dev/null; then
              echo "analytics up after ${i}s"
              break
            fi
            sleep 1
          done
          curl -sf http://127.0.0.1:3200/api/health || (cat /tmp/analytics.log; exit 1)

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Playwright tests
        run: pnpm exec playwright test --project=chromium

      - name: Upload playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-ci
          path: analytics/playwright-report
          retention-days: 7

      - name: Stop analytics
        if: always()
        run: kill $(cat /tmp/analytics.pid) 2>/dev/null || true

  # ── Phase 3 : Docker build + push GHCR (self-hosted, ~30s) ────────
  docker:
    needs: [test, e2e]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: [self-hosted, veridian]
    permissions:
      contents: read
      packages: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version (auto-increment patch)
        id: version
        run: |
          PACKAGE_NAME="analytics"
          EXISTING_TAGS=$(gh api \
            -H "Accept: application/vnd.github+json" \
            "/users/${{ github.repository_owner }}/packages/container/${PACKAGE_NAME}/versions" \
            --jq '.[].metadata.container.tags[]' 2>/dev/null || echo "")
          LATEST_TAG=$(echo "$EXISTING_TAGS" | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -uV | tail -n 1)
          if [ -z "$LATEST_TAG" ]; then
            VERSION="v0.1.0"
          else
            VERSION_WITHOUT_V=${LATEST_TAG#v}
            IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION_WITHOUT_V"
            PATCH=$((PATCH + 1))
            VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Building version: ${VERSION}"
        working-directory: .
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: ./analytics
          file: ./analytics/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  # ── Phase 4 : Deploy staging (dev-server) + E2E staging ───────────
  deploy-staging:
    needs: docker
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: [self-hosted, veridian]
    steps:
      - name: Stop dev service + start staging compose
        run: |
          # Stopper le service next dev pour liberer le port 3100
          systemctl --user stop analytics-dev 2>/dev/null || true
          sleep 2

          cd ~/analytics-test

          # S'assurer que les env vars CI sont dans le .env
          grep -q '^ENABLE_TEST_APIS=' .env 2>/dev/null || echo 'ENABLE_TEST_APIS=true' >> .env
          grep -q '^ADMIN_API_KEY=' .env 2>/dev/null || echo 'ADMIN_API_KEY=staging-admin-key-for-e2e-tests-32ch' >> .env

          docker compose pull
          docker compose up -d --wait
          echo "Staging container restarted with new image"

          # Attendre que le health check passe (port 3100)
          echo "Waiting for staging health..."
          for i in $(seq 1 18); do
            if curl -sf http://127.0.0.1:3100/api/health | grep -q ok; then
              echo "Staging healthy after ${i}0s"
              exit 0
            fi
            sleep 10
          done
          echo "ERROR: staging health check failed after 3min"
          docker compose logs --tail=50
          exit 1
        working-directory: /home/ubuntu

  e2e-staging:
    needs: deploy-staging
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: [self-hosted, veridian]
    defaults:
      run:
        working-directory: analytics
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: analytics/pnpm-lock.yaml

      - name: Install deps
        run: pnpm install --frozen-lockfile || pnpm install --no-frozen-lockfile

      - name: Install Playwright chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Warm-up staging pages
        run: |
          echo "Warming up staging..."
          curl -sf https://analytics-staging.veridian.site/api/health -o /dev/null && echo "  /api/health OK"
          curl -sf https://analytics-staging.veridian.site/login -o /dev/null && echo "  /login OK"
          echo "Warm-up done"

      - name: "E2E Staging — smoke tests"
        env:
          ANALYTICS_E2E_URL: https://analytics-staging.veridian.site
          E2E_EMAIL: robert@veridian.site
          E2E_PASSWORD: test1234
          ADMIN_API_KEY: ${{ secrets.ANALYTICS_STAGING_ADMIN_KEY }}
        run: |
          # Sur staging, on lance les tests de base (health, auth, dashboard, tracker)
          # mais PAS admin-console/tenant-isolation (data différente du CI seed)
          pnpm exec playwright test \
            tests/e2e/01-health.spec.ts \
            tests/e2e/02-auth.spec.ts \
            tests/e2e/03-dashboard.spec.ts \
            tests/e2e/05-tracker.spec.ts \
            --project=chromium --reporter=list --workers=1

      - name: Upload playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-staging
          path: analytics/playwright-report
          retention-days: 7

  # ── Phase 5 : Deploy prod (VPS Dokploy) ───────────────────────────
  deploy-prod:
    needs: e2e-staging
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy prod (with rollback tag)
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          VPS_HOST: ${{ vars.VPS_HOST }}
          VPS_USER: ${{ vars.VPS_USER }}
          COMPOSE_ID: ${{ vars.ANALYTICS_COMPOSE_ID_PROD }}
        run: |
          if [ -z "$SSH_KEY" ] || [ -z "$VPS_HOST" ] || [ -z "$COMPOSE_ID" ]; then
            echo "ERROR: Prod deploy not configured — ANALYTICS_COMPOSE_ID_PROD missing"
            exit 1
          fi
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H $VPS_HOST >> ~/.ssh/known_hosts 2>/dev/null

          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no $VPS_USER@$VPS_HOST bash -s << 'DEPLOY'
            # Tag current image as rollback BEFORE pulling new one
            CURRENT_ID=$(docker images ghcr.io/christ-roy/analytics:latest --format '{{.ID}}' 2>/dev/null)
            if [ -n "$CURRENT_ID" ]; then
              docker tag "$CURRENT_ID" ghcr.io/christ-roy/analytics:rollback
              echo "Tagged current image as :rollback ($CURRENT_ID)"
            fi

            # Pull new image
            docker pull ghcr.io/christ-roy/analytics:latest
            NEW_ID=$(docker images ghcr.io/christ-roy/analytics:latest --format '{{.ID}}')
            echo "New image: $NEW_ID"

            # Redeploy via Dokploy
            DKEY=$(grep '^DOKPLOY_OVH_API_KEY=' ~/credentials/.all-creds.env | cut -d= -f2)
            curl -sf -X POST \
              -H "x-api-key: $DKEY" \
              -H "Content-Type: application/json" \
              -d '{"json":{"composeId":"'"$COMPOSE_ID"'"}}' \
              http://localhost:3000/api/trpc/compose.redeploy && echo "Analytics prod redeploy triggered"
          DEPLOY

          # Health check post-deploy (wait up to 2 min)
          echo "Waiting for prod health..."
          for i in $(seq 1 12); do
            if curl -sf https://analytics.app.veridian.site/api/health | grep -q ok; then
              echo "Prod healthy after ${i}0s"
              exit 0
            fi
            sleep 10
          done
          echo "ERROR: prod health check failed after 2min"
          exit 1
        working-directory: .

  # ── Phase 6 : Rollback auto si prod cassé ─────────────────────────
  rollback-prod:
    needs: deploy-prod
    if: failure() && needs.deploy-prod.result == 'failure' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Rollback to previous image
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          VPS_HOST: ${{ vars.VPS_HOST }}
          VPS_USER: ${{ vars.VPS_USER }}
          COMPOSE_ID: ${{ vars.ANALYTICS_COMPOSE_ID_PROD }}
        run: |
          if [ -z "$SSH_KEY" ] || [ -z "$VPS_HOST" ] || [ -z "$COMPOSE_ID" ]; then
            echo "Cannot rollback — vars not configured"
            exit 1
          fi
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H $VPS_HOST >> ~/.ssh/known_hosts 2>/dev/null

          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no $VPS_USER@$VPS_HOST bash -s << 'ROLLBACK'
            echo "ROLLING BACK analytics to previous image..."

            ROLLBACK_ID=$(docker images ghcr.io/christ-roy/analytics:rollback --format '{{.ID}}' 2>/dev/null)
            if [ -z "$ROLLBACK_ID" ]; then
              echo "No :rollback image found — cannot rollback"
              exit 1
            fi

            docker tag ghcr.io/christ-roy/analytics:rollback ghcr.io/christ-roy/analytics:latest
            echo "Tagged :rollback ($ROLLBACK_ID) as :latest"

            DKEY=$(grep '^DOKPLOY_OVH_API_KEY=' ~/credentials/.all-creds.env | cut -d= -f2)
            curl -sf -X POST \
              -H "x-api-key: $DKEY" \
              -H "Content-Type: application/json" \
              -d '{"json":{"composeId":"'"$COMPOSE_ID"'"}}' \
              http://localhost:3000/api/trpc/compose.redeploy

            echo "Rolled back analytics to previous image"
          ROLLBACK

          # Verify rollback health (wait up to 90s)
          echo "Verifying rollback health..."
          for i in $(seq 1 9); do
            if curl -sf https://analytics.app.veridian.site/api/health | grep -q ok; then
              echo "Rollback healthy after ${i}0s"
              exit 0
            fi
            sleep 10
          done
          echo "WARNING: rollback health check timed out"
        working-directory: .
