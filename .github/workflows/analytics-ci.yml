# Analytics CI/CD
# Pattern identique a hub-ci.yml : test (cloud) → docker (self-hosted) → deploy prod
#
# Jobs :
#  1. test      — lint, typecheck, vitest, next build (cloud runner)
#  2. e2e       — playwright browser tests contre next start + postgres service
#  3. docker    — build + push GHCR (self-hosted runner, cache local)
#  4. deploy    — redeploy Dokploy + health check (rollback si KO)

name: Analytics CI/CD

on:
  push:
    branches: [main, staging]
    paths:
      - 'analytics/**'
      - '.github/workflows/analytics-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'analytics/**'
  workflow_dispatch:

concurrency:
  group: analytics-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: christ-roy/analytics

defaults:
  run:
    working-directory: analytics

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: analytics/pnpm-lock.yaml

      - name: Install deps
        run: pnpm install --frozen-lockfile || pnpm install --no-frozen-lockfile

      - name: Prisma generate
        run: pnpm exec prisma generate

      - name: Typecheck
        run: pnpm exec tsc --noEmit

      - name: Lint
        run: pnpm lint
        continue-on-error: true

      - name: Unit tests (vitest)
        run: pnpm exec vitest run
        env:
          NODE_ENV: test

      - name: Build check
        run: pnpm build
        env:
          AUTH_SECRET: fake-auth-secret-for-build-at-least-32-chars-xx
          NEXTAUTH_URL: http://localhost:3000
          ADMIN_API_KEY: fake-admin-key-for-build-at-least-32-chars-xx

  e2e:
    needs: test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: analytics
          POSTGRES_PASSWORD: analytics_test_pw
          POSTGRES_DB: analytics
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://analytics:analytics_test_pw@127.0.0.1:5432/analytics?schema=analytics
      AUTH_SECRET: test-auth-secret-for-e2e-at-least-32-chars-xx
      AUTH_TRUST_HOST: 'true'
      NEXTAUTH_URL: http://127.0.0.1:3200
      ADMIN_API_KEY: test-admin-key-for-e2e-at-least-32-chars-xx
      E2E_EMAIL: robert@veridian.site
      E2E_PASSWORD: test1234
      ANALYTICS_E2E_URL: http://127.0.0.1:3200
      # Active les routes /api/test/* (reset, seed-gsc, cleanup-tenant) pour
      # que les e2e puissent gerer leur propre data de fa¢con isolee. La prod
      # n'exporte jamais cette variable — voir lib/test-apis.ts pour le guard
      # qui retourne 404 en prod meme si quelqu'un la settait par erreur.
      ENABLE_TEST_APIS: 'true'

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: analytics/pnpm-lock.yaml

      - name: Install deps
        run: pnpm install --frozen-lockfile || pnpm install --no-frozen-lockfile

      - name: Prisma db push
        run: pnpm exec prisma db push --skip-generate

      - name: Seed test user + tenant veridian + GSC data
        # Le script doit tourner depuis `analytics/` (via defaults.run.working-directory)
        # pour que Node resolve bcryptjs + @prisma/client depuis `analytics/node_modules`.
        # On ecrit donc le script dans le cwd, pas dans /tmp.
        #
        # Contenu du seed :
        #   - User robert@veridian.site (credentials pour les tests)
        #   - Tenant "veridian" (slug=veridian-ci) + Membership OWNER
        #   - Site analytics.veridian.site + GscProperty attachee
        #   - 10 rows GscDaily sur les 7 derniers jours => service gsc actif
        # IMPORTANT : pas de seed Pageview/FormSubmission/SipCall — ainsi les
        # pages /dashboard/forms et /dashboard/calls restent lockees pour que
        # le test 08-locked-pages voie au moins un item lock dans la sidebar.
        run: |
          cat > ci-seed.mjs <<'JS'
          import bcrypt from 'bcryptjs';
          import { PrismaClient } from '@prisma/client';
          const prisma = new PrismaClient();
          const hash = await bcrypt.hash('test1234', 10);

          const user = await prisma.user.upsert({
            where: { email: 'robert@veridian.site' },
            create: { email: 'robert@veridian.site', passwordHash: hash },
            update: { passwordHash: hash },
          });

          const tenant = await prisma.tenant.upsert({
            where: { slug: 'veridian-ci' },
            create: { slug: 'veridian-ci', name: 'Veridian (CI)' },
            update: {},
          });

          await prisma.membership.upsert({
            where: { tenantId_userId: { tenantId: tenant.id, userId: user.id } },
            create: { tenantId: tenant.id, userId: user.id, role: 'OWNER' },
            update: { role: 'OWNER' },
          });

          // Site + GscProperty (upsert par domain via findFirst puis create/update)
          let site = await prisma.site.findFirst({
            where: { tenantId: tenant.id, domain: 'analytics.veridian.site' },
          });
          if (!site) {
            site = await prisma.site.create({
              data: {
                tenantId: tenant.id,
                domain: 'analytics.veridian.site',
                name: 'Analytics Veridian',
              },
            });
          }

          await prisma.gscProperty.upsert({
            where: { siteId: site.id },
            create: {
              siteId: site.id,
              propertyUrl: 'sc-domain:veridian.site',
              lastSyncAt: new Date(),
            },
            update: { lastSyncAt: new Date() },
          });

          // 10 rows GscDaily sur les 7 derniers jours (web + desktop + fra)
          // Unique sur (siteId, day, query, page, country, device, searchType)
          // createMany avec skipDuplicates pour etre idempotent.
          const now = new Date();
          const rows = [];
          const queries = ['serrurier lyon', 'depannage serrurerie', 'cle perdue'];
          const pages = ['/', '/contact', '/tarifs'];
          for (let d = 0; d < 7; d++) {
            const day = new Date(now);
            day.setUTCHours(0, 0, 0, 0);
            day.setUTCDate(day.getUTCDate() - d - 2);
            for (let i = 0; i < 3; i++) {
              const q = queries[i % queries.length];
              const p = pages[i % pages.length];
              const clicks = 10 + i + d;
              const impressions = 100 + i * 10 + d * 5;
              rows.push({
                siteId: site.id,
                day,
                query: q,
                page: p,
                country: 'fra',
                device: 'desktop',
                searchType: 'web',
                clicks,
                impressions,
                ctr: clicks / impressions,
                position: 3 + (i + d) * 0.5,
              });
            }
          }
          await prisma.gscDaily.createMany({ data: rows, skipDuplicates: true });

          console.log('seeded robert@veridian.site + tenant veridian-ci + ' + rows.length + ' GscDaily rows');
          await prisma.$disconnect();
          JS
          node ci-seed.mjs
          rm ci-seed.mjs

      - name: Build
        run: pnpm build

      - name: Copy public/ and .next/static into standalone
        # Next.js standalone output n'embarque PAS automatiquement public/ ni
        # .next/static/ — c'est documente (bug historique). Le Dockerfile le
        # gere via COPY, mais quand on lance `node .next/standalone/server.js`
        # directement en CI il faut recopier manuellement sinon :
        #   - /tracker.js retourne 404 (fix tests 01-health + 05-tracker)
        #   - les assets _next/static/* 404 aussi (CSS/JS manquants)
        run: |
          cp -r public .next/standalone/public
          cp -r .next/static .next/standalone/.next/static

      - name: Start analytics in prod mode (background)
        run: |
          nohup node .next/standalone/server.js > /tmp/analytics.log 2>&1 &
          echo $! > /tmp/analytics.pid
        env:
          HOSTNAME: 127.0.0.1
          PORT: '3200'
          # ENABLE_TEST_APIS est re-export ici pour etre sur qu'il est bien
          # present dans l'environnement du process node (les env du job sont
          # herites mais on prefere etre explicite pour les vars securitaires).
          ENABLE_TEST_APIS: 'true'

      - name: Wait for /api/health
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:3200/api/health >/dev/null; then
              echo "analytics up after ${i}s"
              break
            fi
            sleep 1
          done
          curl -sf http://127.0.0.1:3200/api/health || (cat /tmp/analytics.log; exit 1)

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Playwright tests
        run: pnpm exec playwright test --project=chromium

      - name: Upload playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: analytics/playwright-report
          retention-days: 7

      - name: Stop analytics
        if: always()
        run: kill $(cat /tmp/analytics.pid) 2>/dev/null || true

  docker:
    needs: [test, e2e]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: [self-hosted, veridian]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: |
          PACKAGE_NAME="analytics"
          EXISTING_TAGS=$(gh api \
            -H "Accept: application/vnd.github+json" \
            "/users/${{ github.repository_owner }}/packages/container/${PACKAGE_NAME}/versions" \
            --jq '.[].metadata.container.tags[]' 2>/dev/null || echo "")
          LATEST_TAG=$(echo "$EXISTING_TAGS" | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -uV | tail -n 1)
          if [ -z "$LATEST_TAG" ]; then
            VERSION="v0.1.0"
          else
            VERSION_WITHOUT_V=${LATEST_TAG#v}
            IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION_WITHOUT_V"
            PATCH=$((PATCH + 1))
            VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Building version: ${VERSION}"
        working-directory: .
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: ./analytics
          file: ./analytics/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  deploy-prod:
    needs: docker
    runs-on: ubuntu-latest
    steps:
      - name: Deploy prod
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          VPS_HOST: ${{ vars.VPS_HOST }}
          VPS_USER: ${{ vars.VPS_USER }}
          COMPOSE_ID: ${{ vars.ANALYTICS_COMPOSE_ID_PROD }}
        run: |
          if [ -z "$SSH_KEY" ] || [ -z "$VPS_HOST" ] || [ -z "$COMPOSE_ID" ]; then
            echo "Prod deploy not configured — skipping (ANALYTICS_COMPOSE_ID_PROD missing?)"
            exit 0
          fi
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H $VPS_HOST >> ~/.ssh/known_hosts 2>/dev/null
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no $VPS_USER@$VPS_HOST bash -s <<DEPLOY
            docker pull ghcr.io/christ-roy/analytics:latest
            DKEY=\$(grep '^DOKPLOY_OVH_API_KEY=' ~/credentials/.all-creds.env | cut -d= -f2)
            curl -sf -X POST \
              -H "x-api-key: \$DKEY" \
              -H "Content-Type: application/json" \
              -d '{"json":{"composeId":"'$COMPOSE_ID'"}}' \
              http://localhost:3000/api/trpc/compose.redeploy && echo "Analytics prod redeploy triggered"
          DEPLOY
          echo "Waiting for analytics health..."
          for i in \$(seq 1 12); do
            if curl -sf https://analytics.app.veridian.site/api/health | grep -q ok; then
              echo "Analytics prod healthy after \${i}0s"
              exit 0
            fi
            sleep 10
          done
          echo "WARNING: analytics health check timed out"
        working-directory: .
