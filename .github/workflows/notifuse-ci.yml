# Workflow monorepo cote Veridian-platform : verifie juste que le scaffold
# notifuse/ est trace (README, MERGING-UPSTREAM, .upstream-version).
# Le VRAI build CI/CD vit dans le fork Christ-Roy/notifuse-veridian
# branche `veridian` (.github/workflows/veridian-ci.yml).
#
# Voir notifuse/README.md et todo/apps/notifuse/TODO.md pour le contexte.

name: Notifuse scaffold check (monorepo)

on:
  push:
    branches: [main, staging]
    paths:
      - 'notifuse/**'
      - 'infra/services/notifuse/**'
      - '.github/workflows/notifuse-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'notifuse/**'
      - 'infra/services/notifuse/**'
      - '.github/workflows/notifuse-ci.yml'
  workflow_dispatch:

concurrency:
  group: notifuse-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scaffold-check:
    name: Scaffold check (placeholder)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Verify notifuse/ scaffold
        run: |
          set -euo pipefail
          test -f notifuse/README.md || { echo "Missing notifuse/README.md"; exit 1; }
          test -f notifuse/MERGING-UPSTREAM.md || { echo "Missing notifuse/MERGING-UPSTREAM.md"; exit 1; }
          test -f notifuse/.upstream-version || { echo "Missing notifuse/.upstream-version"; exit 1; }
          UPSTREAM_VERSION="$(cat notifuse/.upstream-version | tr -d '[:space:]')"
          echo "Tracked upstream version: ${UPSTREAM_VERSION}"
          if [ -z "${UPSTREAM_VERSION}" ]; then
            echo "ERROR: .upstream-version is empty"
            exit 1
          fi

      - name: Confirm fork CI takes over
        run: |
          echo "::notice title=Build pipeline lives in fork::Real build/deploy pipeline lives in Christ-Roy/notifuse-veridian (branch veridian, .github/workflows/veridian-ci.yml). This monorepo workflow only validates scaffold integrity."

  compose-check:
    name: Validate infra/services/notifuse/ compose
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Verify infra/services/notifuse/ files exist
        run: |
          set -euo pipefail
          test -f infra/services/notifuse/docker-compose.yml || { echo "Missing docker-compose.yml"; exit 1; }
          test -f infra/services/notifuse/.env.example || { echo "Missing .env.example"; exit 1; }
          test -f infra/services/notifuse/README.md || { echo "Missing README.md"; exit 1; }

      - name: Validate YAML syntax
        run: |
          set -euo pipefail
          python3 -c "import yaml; yaml.safe_load(open('infra/services/notifuse/docker-compose.yml'))"

      - name: Validate compose structure
        run: |
          set -euo pipefail
          cd infra/services/notifuse
          # Set fallbacks so `docker compose config` doesn't fail on missing ENVs
          export POSTGRES_PASSWORD=ci-placeholder
          export NOTIFUSE_SECRET_KEY=ci-placeholder
          export NOTIFUSE_ROOT_EMAIL=ci@veridian.site
          export NOTIFUSE_HUB_API_SECRET=ci-placeholder
          export NOTIFUSE_HUB_WEBHOOK_URL=https://ci.veridian.site
          export NOTIFUSE_HUB_WEBHOOK_SECRET=ci-placeholder
          export SMTP_HOST=smtp.example.com
          export SMTP_PORT=587
          export SMTP_USER=ci@veridian.site
          export SMTP_PASS=ci-placeholder
          export SMTP_ADMIN_EMAIL=ci@veridian.site
          export SMTP_SENDER_NAME=Veridian-CI
          export DOMAIN=app.veridian.site
          docker compose -f docker-compose.yml config --quiet

      - name: Ensure no plaintext secrets committed
        run: |
          set -euo pipefail
          # Anti-leak guard : aucun motif Stripe/Supabase/whsec en clair dans le compose
          if grep -E 'sk_(test|live)_[A-Za-z0-9]{20,}|whsec_[A-Za-z0-9]{20,}|eyJhbGciOi' infra/services/notifuse/docker-compose.yml infra/services/notifuse/.env.example; then
            echo "::error::Plaintext secret detected in compose or .env.example — only \${VAR} interpolations allowed"
            exit 1
          fi
