name: Notifuse — Security cron (Trivy daily)

# Cron quotidien Trivy sur l'image notifuse deployed (tag saas-v* du fork Veridian).
# Détecte les CVE upstream sorties APRÈS le merge (entre 2 releases fork).
# Si CRIT/HIGH apparaît : ce workflow fail, l'agent CI Notifuse doit ouvrir une issue
# sur le fork `christ-roy/notifuse-veridian` pour bumper la base image, puis bump le
# tag dans le compose Git via Dokploy ENV ou PR.
#
# Pourquoi pas de scan sur push : Notifuse n'a PAS de code applicatif dans ce monorepo
# (juste un scaffold + .upstream-version). L'image est buildée et publiée par
# `Christ-Roy/notifuse-veridian` (.github/workflows/veridian-ci.yml, branche `veridian`).
# Le scan se fait donc uniquement sur l'image deployed via le tag du fork.
#
# Référence : SPRINT-GITOPS-VERIDIAN.md "Cron Trivy quotidien".

on:
  schedule:
    - cron: '17 3 * * *'   # 3h17 UTC = 4h17/5h17 Paris (décalé de hub pour éviter la rafale)
  workflow_dispatch:
    inputs:
      image-tag:
        description: "Tag à scanner (override, défaut = saas-v1.0.3 = production active)"
        required: false
        default: 'saas-v1.0.3'

permissions:
  contents: read
  packages: read

jobs:
  trivy-deployed:
    uses: ./.github/workflows/_trivy-image.yml
    with:
      image-ref: ghcr.io/christ-roy/notifuse-veridian:${{ github.event.inputs.image-tag || 'saas-v1.0.3' }}
      severity: 'CRITICAL,HIGH'
      ignore-unfixed: true
