name: Extend Staging Trials (one-off)

# Manually triggered workflow to extend trial_ends_at on staging
# for all tenants. Used to unblock e2e-core when Robert's trial expires.
on:
  workflow_dispatch:

jobs:
  extend:
    runs-on: ubuntu-latest
    steps:
      - name: Extend trials via Supabase staging
        env:
          SUPABASE_URL: https://saas-api.staging.veridian.site
          SERVICE_KEY: ${{ secrets.STAGING_SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          FUTURE=$(date -u -d '+90 days' +%Y-%m-%dT%H:%M:%S.000Z)
          echo "Target trial_ends_at: $FUTURE"

          echo "--- Before ---"
          curl -s "$SUPABASE_URL/rest/v1/tenants?select=id,email,prospection_plan,trial_ends_at" \
            -H "apikey: $SERVICE_KEY" \
            -H "Authorization: Bearer $SERVICE_KEY" | python3 -m json.tool || true

          echo "--- Updating all tenants ---"
          # PostgREST requires a filter to prevent updating all rows,
          # use "prospection_plan=not.is.null" as catch-all
          curl -s -X PATCH "$SUPABASE_URL/rest/v1/tenants?prospection_plan=not.is.null" \
            -H "apikey: $SERVICE_KEY" \
            -H "Authorization: Bearer $SERVICE_KEY" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "{\"trial_ends_at\":\"$FUTURE\"}"

          echo ""
          echo "--- After ---"
          curl -s "$SUPABASE_URL/rest/v1/tenants?select=id,email,prospection_plan,trial_ends_at" \
            -H "apikey: $SERVICE_KEY" \
            -H "Authorization: Bearer $SERVICE_KEY" | python3 -m json.tool || true
