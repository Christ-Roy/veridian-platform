name: CMS CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'cms/**'
      - '.github/workflows/cms-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'cms/**'
  workflow_dispatch:

concurrency:
  group: ci-cms-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '10.28.1'
  REGISTRY: ghcr.io
  IMAGE_NAME: christ-roy/veridian-cms

jobs:
  static:
    name: Static checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cms
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: cms/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - name: TypeScript
        run: pnpm exec tsc --noEmit

  build:
    name: Build & push (runner + builder)
    needs: static
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        run: echo "tag=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Build runner image
        uses: docker/build-push-action@v6
        with:
          context: ./cms
          target: runner
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build builder image
        uses: docker/build-push-action@v6
        with:
          context: ./cms
          target: builder
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-builder:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-builder:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  e2e:
    name: E2E Playwright (headful)
    needs: build
    runs-on: [self-hosted, linux, x64]
    env:
      IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
      CMS_URL: http://localhost:3001
      COMPOSE_PROJECT: cms-e2e-${{ github.run_id }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Login GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: Pull images
        run: |
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-builder:${{ env.IMAGE_TAG }}
          docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} veridian/cms-e2e:${{ env.IMAGE_TAG }}
          docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-builder:${{ env.IMAGE_TAG }} veridian/cms-builder-e2e:${{ env.IMAGE_TAG }}

      - name: Start ephemeral stack
        working-directory: cms/e2e
        env:
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
        run: docker compose -f docker-compose.e2e.yml -p ${{ env.COMPOSE_PROJECT }} up -d --no-build

      - name: Wait for /api/health
        run: |
          for i in $(seq 1 90); do
            if curl -sf http://localhost:3001/api/health 2>/dev/null | grep -q '"status":"ok"'; then
              echo "Health OK after ${i}x2s"
              exit 0
            fi
            sleep 2
          done
          echo "Health failed after 3min"
          docker compose -f cms/e2e/docker-compose.e2e.yml -p ${{ env.COMPOSE_PROJECT }} logs --tail=200
          exit 1

      - name: Seed E2E super-admin
        id: seed
        run: |
          KEY=$(docker run --rm --network ${{ env.COMPOSE_PROJECT }}_default \
            -e DATABASE_URL=postgresql://cms:e2epass@cms-postgres-e2e:5432/veridian_cms_e2e \
            -e PAYLOAD_SECRET=e2e_secret_not_for_prod_64chars_aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa \
            -e NODE_ENV=production \
            -e SERVER_URL=http://localhost:3001 \
            veridian/cms-builder-e2e:${{ env.IMAGE_TAG }} \
            sh -c 'cd /app && pnpm tsx scripts/create-admin-api-key.ts' \
            2>&1 | grep -E '^[a-f0-9]{64}$' | head -1)
          if [ -z "$KEY" ]; then echo "API key not extracted"; exit 1; fi
          echo "::add-mask::$KEY"
          echo "key=$KEY" >> $GITHUB_OUTPUT

      - name: Install Playwright deps
        working-directory: cms/e2e
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        working-directory: cms/e2e
        run: pnpm exec playwright install chromium --with-deps

      - name: Run E2E (headful via xvfb)
        working-directory: cms/e2e
        env:
          CMS_URL: http://localhost:3001
          CMS_ADMIN_API_KEY: ${{ steps.seed.outputs.key }}
          CMS_E2E_ADMIN_PASSWORD: ${{ secrets.CMS_E2E_ADMIN_PASSWORD }}
        run: xvfb-run -a pnpm exec playwright test

      - name: Stop ephemeral stack
        if: always()
        working-directory: cms/e2e
        run: docker compose -f docker-compose.e2e.yml -p ${{ env.COMPOSE_PROJECT }} down -v

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-${{ github.run_id }}
          path: cms/e2e/playwright-report/
          retention-days: 14

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-traces-${{ github.run_id }}
          path: cms/e2e/test-results/
          retention-days: 14

  deploy:
    name: Deploy → OVH prod
    needs: [build, e2e]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 51.210.7.44 >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy via pull GHCR + migrate + up
        env:
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
        run: |
          ssh ubuntu@51.210.7.44 IMAGE_TAG="$IMAGE_TAG" bash <<'REMOTE'
            set -e
            cd /home/ubuntu/veridian-cms-prod
            git fetch origin main
            git reset --hard origin/main

            # Login GHCR (token expire, mais OK pour pull public-ish)
            echo "${GHCR_PULL_TOKEN:-}" | docker login ghcr.io -u christ-roy --password-stdin || true

            # Pull runner + builder images depuis GHCR (pas de rebuild local)
            docker pull ghcr.io/christ-roy/veridian-cms:${IMAGE_TAG}
            docker pull ghcr.io/christ-roy/veridian-cms-builder:${IMAGE_TAG}

            # Migrate DB via builder image
            docker run --rm \
              --network veridian-cms-prod_default \
              --env-file .env \
              -e NODE_ENV=production \
              ghcr.io/christ-roy/veridian-cms-builder:${IMAGE_TAG} \
              sh -c 'cd /app && pnpm payload migrate'

            # Up avec nouvelle image (pas de --build, on pull GHCR)
            export IMAGE_TAG
            docker compose -f cms/docker-compose.ovh-prod.yml -p veridian-cms-prod up -d
          REMOTE

      - name: Health check + rollback if needed
        run: |
          OK=0
          for i in $(seq 1 30); do
            if curl -sf https://cms.veridian.site/api/health | grep -q '"status":"ok"'; then
              echo "Health OK after ${i}x6s"
              OK=1
              break
            fi
            sleep 6
          done
          if [ "$OK" -ne 1 ]; then
            echo "Health failed — rolling back to previous image"
            ssh ubuntu@51.210.7.44 bash <<'REMOTE'
              cd /home/ubuntu/veridian-cms-prod
              # Récupère le sha précédent depuis git reflog
              PREV_TAG=$(git rev-parse HEAD@{1})
              echo "Rolling back to $PREV_TAG"
              git reset --hard HEAD@{1}
              docker pull ghcr.io/christ-roy/veridian-cms:${PREV_TAG} || docker pull ghcr.io/christ-roy/veridian-cms:latest
              IMAGE_TAG=${PREV_TAG} docker compose -f cms/docker-compose.ovh-prod.yml -p veridian-cms-prod up -d
          REMOTE
            exit 1
          fi

  smoke:
    name: Smoke prod
    needs: deploy
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - run: curl -sf https://cms.veridian.site/api/health | grep -q '"status":"ok"'
      - run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" https://cms.veridian.site/admin)
          [ "$code" = "200" ]
      - run: |
          curl -sf -H "Authorization: users API-Key ${{ secrets.CMS_ADMIN_API_KEY_PROD }}" \
            https://cms.veridian.site/api/tenants | grep -q '"docs"'

      - name: Telegram alert
        if: always()
        run: |
          STATUS="${{ job.status }}"
          ICON="OK"; [ "$STATUS" != "success" ] && ICON="FAIL"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d "text=$ICON CMS prod $STATUS — sha=${GITHUB_SHA:0:7}" >/dev/null || true
