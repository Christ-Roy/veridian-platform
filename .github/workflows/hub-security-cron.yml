name: Hub — Security cron (DEPRECATED — extraction 2026-05-13)

# ⚠️ DÉPRÉCIÉ depuis 2026-05-13.
# Hub a été extrait dans son propre repo : https://github.com/Christ-Roy/veridian-hub
# Le cron Trivy quotidien tourne maintenant LÀ-BAS.
#
# Ce workflow garde uniquement workflow_dispatch (déclenchement manuel) au cas
# où il faille revert l'extraction. Schedule désactivé pour éviter un double
# scan (et un double "fail = ouvrir PR de bump" sur le mauvais repo).

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  trivy-deployed:
    uses: ./.github/workflows/_trivy-image.yml
    with:
      image-ref: ghcr.io/christ-roy/veridian-dashboard:latest
      severity: 'CRITICAL,HIGH'
      ignore-unfixed: true
