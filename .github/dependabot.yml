version: 2

# Dependabot config monorepo veridian-platform.
# Chaque app ajoute SES ecosystems ci-dessous. Préfixer les labels par l'app
# pour que les PRs soient routables au bon agent applicatif.
# Référence : SPRINT-GITOPS-VERIDIAN.md Phase B.

updates:
  # --- hub : extrait dans veridian-hub le 2026-05-13 ---
  # Dependabot config hub vit maintenant dans https://github.com/Christ-Roy/veridian-hub
  # Le dossier hub/ reste dans ce monorepo jusqu'à validation 7j du nouveau repo,
  # mais on coupe Dependabot ici pour ne pas faire double-emploi.

  # --- prospection ---
  - package-ecosystem: "npm"
    directory: "/prospection"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:00"
      timezone: "Europe/Paris"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "app:prospection"
    commit-message:
      prefix: "chore(prospection-deps)"
      include: "scope"
    groups:
      next-stack:
        patterns:
          - "next"
          - "next-auth"
          - "@auth/*"
          - "react"
          - "react-dom"
      prisma-stack:
        patterns:
          - "prisma"
          - "@prisma/*"
      dev-tooling:
        dependency-type: "development"
        patterns:
          - "vitest"
          - "@vitest/*"
          - "@playwright/test"
          - "playwright"
          - "eslint*"
          - "typescript"
          - "@types/*"
    # Majors framework restent en PR individuelles, review humaine
    ignore:
      - dependency-name: "next"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "next-auth"
        update-types: ["version-update:semver-major"]

  # NOTE : ecosystem `docker` non configuré pour /infra/services/prospection
  # car Dependabot docker ne scanne PAS docker-compose.yml (cf NOTE hub ci-dessus).
  # Le bump des images SHA-pinnées passe par :
  #   - prospection-security-cve.yml (cron Trivy quotidien — détecte CVE upstream)
  #   - bump manuel ou via Renovate (.github/renovate.json)

  # --- github-actions (cross-app) ---
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Paris"
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "chore(ci)"
      include: "scope"
    groups:
      github-actions-patches:
        update-types:
          - "patch"
          - "minor"
