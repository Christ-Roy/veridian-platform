version: 2

# Dependabot config monorepo veridian-platform.
# Chaque app ajoute SES ecosystems ci-dessous. Préfixer les labels par l'app
# pour que les PRs soient routables au bon agent applicatif.
# Référence : SPRINT-GITOPS-VERIDIAN.md Phase B.

updates:
  # --- hub ---
  - package-ecosystem: "npm"
    directory: "/hub"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Paris"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "app:hub"
    commit-message:
      prefix: "chore(hub-deps)"
      include: "scope"
    groups:
      next-stack:
        patterns:
          - "next"
          - "next-auth"
          - "@auth/*"
          - "react"
          - "react-dom"
      prisma-stack:
        patterns:
          - "prisma"
          - "@prisma/*"
      dev-tooling:
        dependency-type: "development"
        patterns:
          - "vitest"
          - "@vitest/*"
          - "eslint*"
          - "typescript"
          - "@types/*"

  - package-ecosystem: "docker"
    directory: "/hub"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Paris"
    labels:
      - "dependencies"
      - "app:hub"
      - "docker"
    commit-message:
      prefix: "chore(hub-docker)"

  # NOTE : Dependabot ecosystem `docker` ne scanne QUE Dockerfile / k8s YAML,
  # pas docker-compose.yml (limitation upstream). Pour le compose GitOps
  # `infra/services/hub/docker-compose.yml`, on s'appuie sur :
  #   - hub-security-cron.yml (cron Trivy quotidien sur image deployed)
  #   - le bump auto de :latest dans le compose (digest overridable via Dokploy ENV)
  # Renovate gère compose nativement — à activer plus tard si besoin (cf
  # sprint SPRINT-GITOPS-VERIDIAN section "Auto-merge sur patches Trivy-clean").

  # --- prospection : EXTRAITE 2026-05-13 vers Christ-Roy/veridian-prospection ---
  # Dependabot pour prospection est désormais dans son propre repo.

  # --- github-actions (cross-app) ---
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Paris"
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "chore(ci)"
      include: "scope"
    groups:
      github-actions-patches:
        update-types:
          - "patch"
          - "minor"
