version: 2

# Dependabot config monorepo veridian-platform.
# Chaque app ajoute SES ecosystems ci-dessous. Préfixer les labels par l'app
# pour que les PRs soient routables au bon agent applicatif.
# Référence : SPRINT-GITOPS-VERIDIAN.md Phase B.

updates:
  # --- hub ---
  - package-ecosystem: "npm"
    directory: "/hub"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Paris"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "app:hub"
    commit-message:
      prefix: "chore(hub-deps)"
      include: "scope"
    groups:
      next-stack:
        patterns:
          - "next"
          - "next-auth"
          - "@auth/*"
          - "react"
          - "react-dom"
      prisma-stack:
        patterns:
          - "prisma"
          - "@prisma/*"
      dev-tooling:
        dependency-type: "development"
        patterns:
          - "vitest"
          - "@vitest/*"
          - "eslint*"
          - "typescript"
          - "@types/*"

  - package-ecosystem: "docker"
    directory: "/hub"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Paris"
    labels:
      - "dependencies"
      - "app:hub"
      - "docker"
    commit-message:
      prefix: "chore(hub-docker)"

  - package-ecosystem: "docker"
    directory: "/infra/services/hub"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Paris"
    labels:
      - "dependencies"
      - "app:hub"
      - "docker"
      - "gitops"
    commit-message:
      prefix: "chore(hub-compose)"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Paris"
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "chore(ci)"
