version: 2

# Dependabot config monorepo veridian-platform.
# Chaque app ajoute SES ecosystems ci-dessous. Préfixer les labels par l'app
# pour que les PRs soient routables au bon agent applicatif.
# Référence : SPRINT-GITOPS-VERIDIAN.md Phase B.

updates:
  # --- hub ---
  - package-ecosystem: "npm"
    directory: "/hub"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Paris"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "app:hub"
    commit-message:
      prefix: "chore(hub-deps)"
      include: "scope"
    groups:
      next-stack:
        patterns:
          - "next"
          - "next-auth"
          - "@auth/*"
          - "react"
          - "react-dom"
      prisma-stack:
        patterns:
          - "prisma"
          - "@prisma/*"
      dev-tooling:
        dependency-type: "development"
        patterns:
          - "vitest"
          - "@vitest/*"
          - "eslint*"
          - "typescript"
          - "@types/*"

  - package-ecosystem: "docker"
    directory: "/hub"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Paris"
    labels:
      - "dependencies"
      - "app:hub"
      - "docker"
    commit-message:
      prefix: "chore(hub-docker)"

  # NOTE : Dependabot ecosystem `docker` ne scanne QUE Dockerfile / k8s YAML,
  # pas docker-compose.yml (limitation upstream). Pour le compose GitOps
  # `infra/services/hub/docker-compose.yml`, on s'appuie sur :
  #   - hub-security-cron.yml (cron Trivy quotidien sur image deployed)
  #   - le bump auto de :latest dans le compose (digest overridable via Dokploy ENV)
  # Renovate gère compose nativement — à activer plus tard si besoin (cf
  # sprint SPRINT-GITOPS-VERIDIAN section "Auto-merge sur patches Trivy-clean").

  # --- prospection ---
  - package-ecosystem: "npm"
    directory: "/prospection"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:00"
      timezone: "Europe/Paris"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "app:prospection"
    commit-message:
      prefix: "chore(prospection-deps)"
      include: "scope"
    groups:
      next-stack:
        patterns:
          - "next"
          - "next-auth"
          - "@auth/*"
          - "react"
          - "react-dom"
      prisma-stack:
        patterns:
          - "prisma"
          - "@prisma/*"
      dev-tooling:
        dependency-type: "development"
        patterns:
          - "vitest"
          - "@vitest/*"
          - "@playwright/test"
          - "playwright"
          - "eslint*"
          - "typescript"
          - "@types/*"
    # Majors framework restent en PR individuelles, review humaine
    ignore:
      - dependency-name: "next"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "next-auth"
        update-types: ["version-update:semver-major"]

  # NOTE : ecosystem `docker` non configuré pour /infra/services/prospection
  # car Dependabot docker ne scanne PAS docker-compose.yml (cf NOTE hub ci-dessus).
  # Le bump des images SHA-pinnées passe par :
  #   - prospection-security-cve.yml (cron Trivy quotidien — détecte CVE upstream)
  #   - bump manuel ou via Renovate (.github/renovate.json)

  # --- github-actions (cross-app) ---
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Paris"
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "chore(ci)"
      include: "scope"
    groups:
      github-actions-patches:
        update-types:
          - "patch"
          - "minor"
