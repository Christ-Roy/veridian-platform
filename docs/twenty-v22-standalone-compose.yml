# Twenty v2.2.0 — Standalone bocal (dev-server, sans Traefik)
# Utilisé pour Phase 1 du runbook migration-twenty-v22-runbook.md
# Port 3000 exposé direct, pas de reverse proxy, pas de cert TLS
#
# Usage :
#   ssh dev-pub
#   cd /opt/twenty-v22-test
#   sudo docker compose up -d
#   ssh -L 3000:localhost:3000 dev-pub  # tunnel depuis local
#   # browser : http://localhost:3000
#
# Variables requises dans .env (cf runbook section 1.1) :
#   POSTGRES_PASSWORD=<random>
#   TWENTY_APP_SECRET=<random>
#   OPENAI_API_KEY=<openrouter_key>

name: twenty-v22-test

services:
  twenty-postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: twenty
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: twenty
    volumes:
      - twenty-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U twenty -d twenty"]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 4G

  twenty-redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["--maxmemory-policy", "noeviction"]
    volumes:
      - twenty-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  twenty-server:
    image: twentycrm/twenty:v2.2.0
    restart: unless-stopped
    depends_on:
      twenty-postgres:
        condition: service_healthy
      twenty-redis:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NODE_PORT: "3000"
      LOG_LEVELS: error,warn
      SERVER_URL: http://localhost:3000
      FRONTEND_URL: http://localhost:3000
      REACT_APP_SERVER_BASE_URL: ""
      APP_SECRET: ${TWENTY_APP_SECRET}
      IS_MULTIWORKSPACE_ENABLED: "true"
      IS_BILLING_ENABLED: "false"
      DEFAULT_SUBDOMAIN: ""
      PG_DATABASE_URL: postgres://twenty:${POSTGRES_PASSWORD}@twenty-postgres:5432/twenty
      REDIS_URL: redis://twenty-redis:6379
      STORAGE_TYPE: local
      STORAGE_LOCAL_PATH: /app/.local-storage
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      AI_CATALOG_STORAGE_PATH: ai-catalog.json
      EMAIL_DRIVER: logger
      EMAIL_FROM_ADDRESS: notifications@veridian.site
      EMAIL_FROM_NAME: Veridian Test
      BILLING_STRIPE_API_KEY: sk_test_unused
      BILLING_STRIPE_WEBHOOK_SECRET: whsec_unused
    volumes:
      - twenty-storage:/app/.local-storage
    deploy:
      resources:
        limits:
          memory: 4G

  twenty-worker:
    image: twentycrm/twenty:v2.2.0
    restart: unless-stopped
    depends_on:
      twenty-server:
        condition: service_started
    command: ["yarn", "worker:prod"]
    environment:
      NODE_ENV: production
      LOG_LEVELS: error,warn
      SERVER_URL: http://localhost:3000
      FRONTEND_URL: http://localhost:3000
      APP_SECRET: ${TWENTY_APP_SECRET}
      DISABLE_DB_MIGRATIONS: "true"
      DISABLE_CRON_JOBS_REGISTRATION: "true"
      PG_DATABASE_URL: postgres://twenty:${POSTGRES_PASSWORD}@twenty-postgres:5432/twenty
      REDIS_URL: redis://twenty-redis:6379
      STORAGE_TYPE: local
      STORAGE_LOCAL_PATH: /app/.local-storage
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      EMAIL_DRIVER: logger
      EMAIL_FROM_ADDRESS: notifications@veridian.site
      EMAIL_FROM_NAME: Veridian Test
      BILLING_STRIPE_API_KEY: sk_test_unused
      BILLING_STRIPE_WEBHOOK_SECRET: whsec_unused
    volumes:
      - twenty-storage:/app/.local-storage
    deploy:
      resources:
        limits:
          memory: 2G

volumes:
  twenty-db: {}
  twenty-redis: {}
  twenty-storage: {}
